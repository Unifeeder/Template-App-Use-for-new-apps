kind = "web"
previewPath = "/"
title = "DP World Starter App"
version = "1.0.0"
id = "artifacts/starter-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/api" ]
localPort = 25071

[services.development]
run = "pnpm --filter @workspace/starter-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/starter-app", "run", "build" ]

[services.production.run]
args = ["node", "artifacts/starter-app/dist/index.cjs"]

[services.production.run.env]
PORT = "25071"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "25071"
BASE_PATH = "/"
