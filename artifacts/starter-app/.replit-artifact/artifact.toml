kind = "web"
previewPath = "/"
title = "DP World Starter App"
version = "1.0.0"
id = "artifacts/starter-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25071

[services.development]
run = "pnpm --filter @workspace/starter-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/starter-app", "run", "build" ]
publicDir = "artifacts/starter-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25071"
BASE_PATH = "/"
